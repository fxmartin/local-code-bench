# Per-model serving knobs:
#   concurrency  in-flight requests for endpoint suite runs (default 1).
#                Cloud APIs scale server-side, so parallel requests cut wall
#                time without distorting per-request timing. Local MLX servers
#                MUST stay at 1: concurrent requests share one GPU and corrupt
#                the prefill/decode tok/s measurements this harness exists to take.
#   max_tokens   hard generation cap for endpoint suite runs (default 1024 when
#                unset). Coding solutions are short; capping trims wasted decode
#                time and cost on verbose models.
models:
  - name: local-example
    type: openai
    base_url: http://localhost:8000/v1
    model_id: local-coding-model
    pinned_revision: manual
    concurrency: 1
    price_per_1k_tokens:
      input: 0.0
      output: 0.0
  - name: openrouter-glm-4.6
    type: openai
    base_url: https://openrouter.ai/api/v1
    model_id: z-ai/glm-4.6
    pinned_revision: openrouter-2026-06-20
    api_key_env: OPENROUTER_API_KEY
    concurrency: 10
    # GLM-4.6 reasons in a separate stream and can exhaust any token budget before
    # emitting code. For a coding benchmark we want the direct answer, so disable
    # reasoning at the provider; the code answer then fits a small cap and runs fast.
    max_tokens: 2048
    extra_body:
      reasoning:
        enabled: false
    price_per_1k_tokens:
      input: 0.00043
      output: 0.00174
  - name: openrouter-kimi-k2
    type: openai
    base_url: https://openrouter.ai/api/v1
    model_id: moonshotai/kimi-k2
    pinned_revision: openrouter-2026-06-20
    api_key_env: OPENROUTER_API_KEY
    concurrency: 10
    max_tokens: 2048
    extra_body:
      reasoning:
        enabled: false
    price_per_1k_tokens:
      input: 0.00057
      output: 0.00230
  - name: anthropic-claude-baseline
    type: anthropic
    base_url: https://api.anthropic.com/v1
    model_id: claude-sonnet-4-6
    pinned_revision: claude-sonnet-4-6
    api_key_env: ANTHROPIC_API_KEY
    concurrency: 8
    max_tokens: 2048
    price_per_1k_tokens:
      input: 0.003
      output: 0.015
  - name: local-dflash-qwen
    type: openai
    base_url: http://localhost:8000/v1
    model_id: mlx-community/Qwen3.6-27B-4bit
    pinned_revision: manual-2026-06-21
    concurrency: 1
    # Declares the engine `--manage-inferencers` auto-starts (port 8000 = dflash).
    inferencer: dflash
    # Qwen3.6 reasons inline (in code comments) and can overrun the 1024 default,
    # truncating the solution. 2048 gives it room. To go faster instead, try
    # disabling thinking via extra_body if the MLX server honors it.
    max_tokens: 2048
    price_per_1k_tokens:
      input: 0.0
      output: 0.0
  - name: local-turboquant-qwen-moe
    type: openai
    base_url: http://localhost:8002/v1
    model_id: manjunathshiva/Qwen3.6-35B-A3B-tq3-g32
    pinned_revision: manual-2026-06-21
    concurrency: 1
    # Declares the engine `--manage-inferencers` auto-starts (port 8002 = turboquant).
    inferencer: turboquant
    # Qwen3.6 MoE reasons in code comments and can overrun the budget on tricky
    # tasks (e.g. HumanEval/113). Raising the cap did not help and this server build
    # ignores chat_template_kwargs.enable_thinking, so we accept it as a real finding
    # rather than chase it. 2048 is enough for the tasks where it does terminate.
    max_tokens: 2048
    price_per_1k_tokens:
      input: 0.0
      output: 0.0
  - name: local-mtplx-qwen
    type: openai
    base_url: http://localhost:8003/v1
    # MTPLX needs its OWN pre-built MTP models (the Youssofal HF catalog: Qwen 3.5/3.6,
    # Gemma 4), verified by `mtplx inspect`. This points at an MTPLX-specific repo, so a
    # strict same-artifact A/B against other engines is NOT claimed — the run metadata
    # records the differing model build. MTPLX's optional per-machine auto-tuning is a
    # MANUAL pre-step FX runs once outside the harness; see docs/INFERENCER-INSTALLATION.md.
    model_id: Youssofal/Qwen3.6-27B-MTPLX
    pinned_revision: manual-2026-06-26
    concurrency: 1
    # Declares the engine `--manage-inferencers` auto-starts (port 8003 = mtplx).
    inferencer: mtplx
    # Native MTP speculative decoding; like the other Qwen3.6 entries it reasons inline,
    # so give the solution room to terminate.
    max_tokens: 2048
    price_per_1k_tokens:
      input: 0.0
      output: 0.0
