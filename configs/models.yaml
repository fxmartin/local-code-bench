# Per-model serving knobs:
#   concurrency  in-flight requests for endpoint suite runs (default 1).
#                Cloud APIs scale server-side, so parallel requests cut wall
#                time without distorting per-request timing. Local MLX servers
#                MUST stay at 1: concurrent requests share one GPU and corrupt
#                the prefill/decode tok/s measurements this harness exists to take.
#   max_tokens   hard generation cap for endpoint suite runs (default 1024 when
#                unset). Coding solutions are short; capping trims wasted decode
#                time and cost on verbose models.
models:
  - name: local-example
    type: openai
    base_url: http://localhost:8080/v1
    model_id: local-coding-model
    pinned_revision: manual
    concurrency: 1
    price_per_1k_tokens:
      input: 0.0
      output: 0.0
  - name: openrouter-glm-4.6
    type: openai
    base_url: https://openrouter.ai/api/v1
    model_id: z-ai/glm-4.6
    pinned_revision: openrouter-2026-06-20
    api_key_env: OPENROUTER_API_KEY
    concurrency: 10
    # GLM-4.6 reasons in a separate stream and can exhaust any token budget before
    # emitting code. For a coding benchmark we want the direct answer, so disable
    # reasoning at the provider; the code answer then fits a small cap and runs fast.
    max_tokens: 2048
    extra_body:
      reasoning:
        enabled: false
    price_per_1k_tokens:
      input: 0.00043
      output: 0.00174
  - name: openrouter-kimi-k2
    type: openai
    base_url: https://openrouter.ai/api/v1
    model_id: moonshotai/kimi-k2
    pinned_revision: openrouter-2026-06-20
    api_key_env: OPENROUTER_API_KEY
    concurrency: 10
    max_tokens: 2048
    extra_body:
      reasoning:
        enabled: false
    price_per_1k_tokens:
      input: 0.00057
      output: 0.00230
  - name: anthropic-claude-baseline
    type: anthropic
    base_url: https://api.anthropic.com/v1
    model_id: claude-sonnet-4-6
    pinned_revision: claude-sonnet-4-6
    api_key_env: ANTHROPIC_API_KEY
    concurrency: 8
    max_tokens: 2048
    price_per_1k_tokens:
      input: 0.003
      output: 0.015
  - name: local-mlx-qwen
    type: openai
    base_url: http://localhost:8080/v1
    model_id: mlx-community/Qwen3.6-27B-4bit
    pinned_revision: manual-2026-06-21
    concurrency: 1
    # Declares the engine `--manage-inferencers` auto-starts (port 8080 = mlx-lm).
    inferencer: mlx-lm
    # Keep endpoint scoring focused on the submitted code. In thinking mode this
    # model spends the full budget narrating drafts and may truncate the final block.
    max_tokens: 2048
    extra_body:
      chat_template_kwargs:
        enable_thinking: false
    price_per_1k_tokens:
      input: 0.0
      output: 0.0
  - name: local-ollama-qwen
    type: openai
    # Ollama exposes an OpenAI-compatible endpoint under /v1.
    base_url: http://localhost:11434/v1
    # Set to the exact tag you pulled (`ollama list`).
    model_id: qwen3.6:27b
    pinned_revision: manual-2026-07-14
    concurrency: 1
    # Declares the engine `--manage-inferencers` auto-starts (port 11434 = ollama).
    inferencer: ollama
    max_tokens: 2048
    price_per_1k_tokens:
      input: 0.0
      output: 0.0
  # --- Agentic-coding candidate matrix (added 2026-07-16) -----------------------
  # Five candidates to compare against the Qwen3.6-27B dense baseline on the
  # M3 Max 48 GB: four are ~3B-active MoE (tests whether MoE savings move the
  # prefill-bound numbers, not just decode) plus one dense SWE-agent specialist.
  - name: local-mlx-qwen3-coder-30b
    type: openai
    base_url: http://localhost:8080/v1
    # Coding-specialized MoE (30B total / 3.3B active), ~17 GB at 4-bit, 256K
    # context. Non-thinking by design, so no enable_thinking kwarg is needed.
    model_id: mlx-community/Qwen3-Coder-30B-A3B-Instruct-4bit
    pinned_revision: manual-2026-07-16
    concurrency: 1
    inferencer: mlx-lm
    max_tokens: 2048
    price_per_1k_tokens:
      input: 0.0
      output: 0.0
  - name: local-ollama-devstral-24b
    type: openai
    base_url: http://localhost:11434/v1
    # Dense 24B SWE-agent specialist (Mistral x All Hands). Served via Ollama:
    # the mlx-community Devstral-Small-2-24B-Instruct-2512-4bit quant has an open
    # tokenizer-bug report (gibberish output) as of 2026-07, so the GGUF path is
    # the reliable one. Pull with `ollama pull devstral:24b`.
    model_id: devstral:24b
    pinned_revision: manual-2026-07-16
    concurrency: 1
    inferencer: ollama
    max_tokens: 2048
    price_per_1k_tokens:
      input: 0.0
      output: 0.0
  - name: local-mlx-gpt-oss-20b
    type: openai
    base_url: http://localhost:8080/v1
    # 21B MoE / 3.6B active, native MXFP4 (~12 GB) — the cheap lower anchor for
    # the speed/quality frontier. Emits Harmony-format reasoning before the final
    # answer and has no disable switch, so give it headroom: a 2048 cap risks
    # truncating the code block after the reasoning spend.
    model_id: mlx-community/gpt-oss-20b-MXFP4-Q8
    pinned_revision: manual-2026-07-16
    concurrency: 1
    inferencer: mlx-lm
    max_tokens: 4096
    price_per_1k_tokens:
      input: 0.0
      output: 0.0
  - name: local-ollama-ornith-35b
    type: openai
    base_url: http://localhost:11434/v1
    # Ornith 1.0 (DeepReinforce, 2026-06-25): 35B MoE / ~3B active, MIT, trained
    # to self-scaffold agentic runs. Served via Ollama because mlx-community only
    # publishes 8-bit (~37 GB) and bf16 quants as of 2026-07 — no 4-bit yet.
    # Watch endpoint-mode output for scaffold preamble around the code block;
    # the higher cap keeps it from truncating the actual solution.
    model_id: ornith:35b
    pinned_revision: manual-2026-07-16
    concurrency: 1
    inferencer: ollama
    max_tokens: 4096
    price_per_1k_tokens:
      input: 0.0
      output: 0.0
  - name: local-mlx-qwen3-coder-next-3bit
    type: openai
    base_url: http://localhost:8080/v1
    # Stretch pick probing the 48 GB ceiling: 80B MoE / 3B active at 3-bit
    # (~35 GB). mlx-community only ships 4-bit (~44 GB — no KV-cache room), so
    # this uses the smoke-verified community 3-bit conversion. Raise the GPU
    # wired limit before running (`sudo sysctl iogpu.wired_limit_mb=44000`) and
    # keep other GPU work closed.
    model_id: majentik/Qwen3-Coder-Next-MLX-3bit
    pinned_revision: manual-2026-07-16
    concurrency: 1
    inferencer: mlx-lm
    max_tokens: 2048
    price_per_1k_tokens:
      input: 0.0
      output: 0.0
