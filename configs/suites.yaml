# Custom benchmark suites (Story 09.5-001).
#
# The built-in suites (humaneval, mbpp, canary, humaneval-plus, mbpp-plus) are
# always available and need no entry here. Use this file to register *additional*
# suites that point at a loadable dataset, without changing any code. Registered
# suites appear in the dashboard launcher and are runnable by id everywhere a
# built-in suite is (`bench --suite <id>`).
#
#   id      selector id. Must be unique and must not collide with a built-in name.
#   label   optional human label shown in the launcher (defaults to the id).
#   source  path to the dataset, relative to this file. A `.jsonl`/`.jsonl.gz`
#           file (one JSON record per line) or a `.json` file holding a list (or a
#           `{"data": [...]}` object).
#   format  optional override (`jsonl` | `json`); inferred from the extension.
#
# Dataset records take: task_id (optional, defaults to <suite>/<index>), prompt
# (required), test_code (required; exec'd in the sandbox after the extracted
# completion), entry_point (optional, default "solution"), version (optional).
#
# A suite whose source is missing or unreadable is listed *disabled with a reason*
# rather than offered and failing at launch.

suites:
  # Mini-app rung above the function-level suites: one deterministic JSON-diff
  # CLI spec, scored black-box by four hidden behavioural slices (core,
  # format-order, type-edges, exit-codes) that share a single prompt. Generated
  # by scripts/build_jsondiff_suite.py — regenerate rather than hand-editing,
  # and version the suite id if the spec ever changes. Run with a raised cap
  # (e.g. --max-tokens 2048): a full program outgrows the 1024 default.
  - id: jsondiff-cli
    label: JSON-diff CLI (mini-app)
    source: datasets/jsondiff-cli.jsonl

  # Rung 3: a harder mini-app — an expression evaluator needing a tokenizer and
  # recursive-descent parser. The grammar is deliberately not Python (^ is
  # exponentiation, ** is a syntax error) so an eval() shortcut fails. Four
  # slices (arithmetic, power-unary, format-file, errors) share one prompt.
  # Generated by scripts/build_calc_suite.py; run with --max-tokens 2048+.
  - id: calc-cli
    label: Calc CLI (mini-app, parser)
    source: datasets/calc-cli.jsonl

  # Rung 4, a different axis: debugging. Each record is a small buggy module
  # plus a true bug report; the model returns the fixed module, scored on both
  # the fix and regression behaviour. One record per bug (five classic Python
  # failure modes). Generated by scripts/build_bugfix_suite.py.
  - id: bugfix-py
    label: Bugfix (Python debugging)
    source: datasets/bugfix-py.jsonl
