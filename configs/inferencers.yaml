# Inference engines the harness can detect and (for `server` lifecycle) manage.
#
#   lifecycle  `server` = headless engine with a full start/stop lifecycle;
#              `app`    = detect-only GUI app that must be managed from its own UI.
#   detect     exactly one of binary / module / app:
#                binary -> resolved with `shutil.which`
#                module -> resolved with `importlib.util.find_spec`
#                app    -> a macOS `.app` bundle under /Applications or ~/Applications
#   port       the TCP port the OpenAI-compatible server listens on.
#   health_url liveness probe; `{port}` is substituted at load time.
#   start/stop argv lists. `server` entries require `start`; `app` entries must
#              define neither (GUI apps are never started/stopped headlessly).
#   url        optional reference link (official website or GitHub). The harness
#              NEVER installs an engine — when one is not installed it points you
#              to this URL to install it manually. See docs/INFERENCER-INSTALLATION.md.
inferencers:
  # --- Headless servers (full lifecycle) ---------------------------------
  - name: dflash
    lifecycle: server
    detect:
      binary: dflash
    port: 8000
    health_url: http://127.0.0.1:{port}/v1/models
    start: ["dflash", "serve"]
    url: https://github.com/bstnxbt/dflash-mlx
  - name: turboquant
    lifecycle: server
    detect:
      binary: turboquant-serve
    port: 8002
    health_url: http://127.0.0.1:{port}/v1/models
    start: ["turboquant-serve"]
    url: https://github.com/helgklaizar/turboquant-mlx
  - name: mlx-lm
    lifecycle: server
    detect:
      module: mlx_lm
    port: 8080
    health_url: http://127.0.0.1:{port}/v1/models
    start: ["mlx_lm.server", "--port", "8080"]
    url: https://github.com/ml-explore/mlx-lm
  - name: llama-cpp
    lifecycle: server
    detect:
      binary: llama-server
    port: 8081
    health_url: http://127.0.0.1:{port}/v1/models
    start: ["llama-server", "--port", "8081"]
    url: https://github.com/ggml-org/llama.cpp
  - name: ollama
    lifecycle: server
    detect:
      binary: ollama
    port: 11434
    health_url: http://127.0.0.1:{port}/api/tags
    start: ["ollama", "serve"]
    stop: ["ollama", "stop"]
    url: https://ollama.com
  - name: mlc-llm
    lifecycle: server
    detect:
      module: mlc_llm
    port: 8082
    health_url: http://127.0.0.1:{port}/v1/models
    start: ["mlc_llm", "serve", "--port", "8082"]
    url: https://github.com/mlc-ai/mlc-llm
  - name: vllm-mlx
    lifecycle: server
    # The standalone `vllm-mlx` package ships a `vllm-mlx` console script
    # (`vllm-mlx serve`). The vllm-metal plugin instead provides module `vllm` +
    # `vllm serve`; switch detect/start to that if you install vllm-metal.
    detect:
      binary: vllm-mlx
    # 8001 rather than 8000 to avoid colliding with dflash.
    port: 8001
    health_url: http://127.0.0.1:{port}/v1/models
    start: ["vllm-mlx", "serve", "--port", "8001"]
    url: https://github.com/vllm-project/vllm
  - name: exo
    lifecycle: server
    # exo upstream runs as `uv run exo` from its clone; expose an `exo` wrapper on
    # PATH so detection (shutil.which) and this start command resolve. See
    # docs/INFERENCER-INSTALLATION.md.
    detect:
      binary: exo
    port: 52415
    health_url: http://127.0.0.1:{port}/v1/models
    start: ["exo"]
    url: https://github.com/exo-explore/exo
  - name: mtplx
    lifecycle: server
    # Native Multi-Token-Prediction MLX runtime: the model drafts ahead with its
    # own built-in MTP heads and verifies them in one batched pass (no external
    # drafter). OpenAI/Anthropic-compatible server, so it drops into the endpoint
    # protocol like dflash/turboquant. MTPLX defaults to 8000 (owned by dflash) —
    # remapped to 8003 to avoid the collision. Requires its own pre-built MTP
    # models (the Youssofal Hugging Face catalog); see docs/INFERENCER-INSTALLATION.md.
    detect:
      binary: mtplx
    port: 8003
    health_url: http://127.0.0.1:{port}/v1/models
    start: ["mtplx", "serve", "--port", "8003"]
    url: https://github.com/youssofal/mtplx
  # --- Detect-only GUI apps ----------------------------------------------
  - name: lm-studio
    lifecycle: app
    detect:
      app: "LM Studio.app"
    port: 1234
    health_url: http://127.0.0.1:{port}/v1/models
    url: https://lmstudio.ai
  - name: gpt4all
    lifecycle: app
    detect:
      app: "GPT4All.app"
    port: 4891
    health_url: http://127.0.0.1:{port}/v1/models
    url: https://github.com/nomic-ai/gpt4all
