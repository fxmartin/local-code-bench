# Inference engines the harness can detect and (for `server` lifecycle) manage.
#
#   lifecycle  `server` = headless engine with a full start/stop lifecycle;
#              `app`    = detect-only GUI app that must be managed from its own UI.
#   detect     exactly one of binary / module / app:
#                binary -> resolved with `shutil.which`
#                module -> resolved with `importlib.util.find_spec`
#                app    -> a macOS `.app` bundle under /Applications or ~/Applications
#   port       the TCP port the OpenAI-compatible server listens on.
#   health_url liveness probe; `{port}` is substituted at load time.
#   start/stop argv lists. `server` entries require `start`; `app` entries must
#              define neither (GUI apps are never started/stopped headlessly).
#   url        optional reference link (official website or GitHub). The harness
#              NEVER installs an engine — when one is not installed it points you
#              to this URL to install it manually. See docs/INFERENCER-INSTALLATION.md.
#   model_store / format  optional (Epic-11): where this engine keeps downloaded
#              models and the on-disk format the inventory scanner reads them with.
#              `model_store` is one path or a list of paths (`~` expanded); `format`
#              is one of ollama | hf-safetensors. Set both or neither.
#
# external_repo  optional (Epic-12): a second-tier model repository on an attached
#              USB/Thunderbolt SSD. `root` is the repo root on the external volume
#              (`~` expanded); `volume_marker` (default `.local-code-bench-external`)
#              is a sentinel file written into `root` so the same repo is recognised
#              across remounts and the tier reads `mounted` only when root + marker
#              are present (else `offline`, never an error). `subpaths` optionally
#              overrides the per-format subdir layout, which by default mirrors the
#              local store (one subdir per ollama | hf-safetensors).
#              Omit the whole block for a single-tier (local-only) setup. Example:
#
# external_repo:
#   root: /Volumes/ModelsSSD/local-code-bench
#   volume_marker: .local-code-bench-external
#   subpaths:
#     hf-safetensors: hf-cache
#
# auto_tier   optional (Epic-12): keep the local tier under a disk budget by
#             auto-evicting least-recently-used models to the external tier. Set
#             `max_local_gb` (the most GiB the local-tier models may occupy),
#             `min_free_gb` (the least free GiB to keep on the local volume), or
#             both (the stricter requirement wins) — at least one is required.
#             `pins` lists model names that are never auto-evicted, even when that
#             leaves the budget unmet (surfaced as a warning). Planning defaults to
#             a safe dry-run; nothing moves until an eviction is explicitly applied,
#             and auto-tiering is paused whenever the external SSD is offline. Omit
#             the block to leave auto-tiering disabled. Example:
#
# auto_tier:
#   max_local_gb: 200
#   min_free_gb: 50
#   pins:
#     - qwen2.5-coder
inferencers:
  - name: mlx-lm
    lifecycle: server
    detect:
      module: mlx_lm
    port: 8080
    health_url: http://127.0.0.1:{port}/v1/models
    start: ["mlx_lm.server", "--port", "8080"]
    url: https://github.com/ml-explore/mlx-lm
    # MLX engines read pre-quantized repos from the shared HuggingFace hub cache
    # and from the local-dir model shelf used for manually resumed downloads.
    model_store:
      - ~/.cache/huggingface/hub
      - ~/.cache/model-shelf/models/mlx
    format: hf-safetensors
  - name: ollama
    lifecycle: server
    detect:
      binary: ollama
    port: 11434
    health_url: http://127.0.0.1:{port}/api/tags
    start: ["ollama", "serve"]
    stop: ["ollama", "stop"]
    url: https://ollama.com
    # Content-addressed blob store (manifests/ + sha256 blobs/), not plain files.
    model_store: ~/.ollama/models
    format: ollama
